name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" >> .env
          echo "VITE_SUPABASE_PROJECT_ID=${{ secrets.VITE_SUPABASE_PROJECT_ID }}" >> .env

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Capacitor packages
        run: npm install --legacy-peer-deps @capacitor/core@6 @capacitor/android@6 @capacitor/cli@6

      - name: Create capacitor config
        run: |
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "org.alnaseer.legal",
            "appName": "منصة الناصر",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          CAPEOF

      - name: Build Vite project
        run: npm run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set Java 21 for Gradle
        run: |
          echo "JAVA_HOME=$JAVA_HOME_21_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_21_X64/bin" >> $GITHUB_PATH

      - name: Grant execute permission
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: alnaser-mobile-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
